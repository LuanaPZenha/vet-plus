# Blueprint Render — Vet Plus+ (produção simplificada)
# https://render.com/docs/blueprint-spec
#
# vet-plus.onrender.com     = frontend + APIs embutidas (tutores, animais, etc.)
# vet-plus-auth.onrender.com = autenticação + verify-token

envVarGroups:
  - name: vet-shared
    envVars:
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: vet-auth-db
    plan: free
    databaseName: auth_db
    user: vet_user

services:
  - type: web
    name: vet-plus
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - fromGroup: vet-shared
      - key: DATABASE_URL
        fromDatabase:
          name: vet-auth-db
          property: connectionString
      - key: AUTH_URL
        fromService:
          type: web
          name: vet-plus-auth
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUTH_HOST
        fromService:
          type: web
          name: vet-plus-auth
          property: host

  - type: web
    name: vet-plus-auth
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.auth
    dockerContext: .
    healthCheckPath: /api/docs/
    envVars:
      - fromGroup: vet-shared
      - key: DATABASE_URL
        fromDatabase:
          name: vet-auth-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: vet-plus
          envVarKey: RENDER_EXTERNAL_URL
