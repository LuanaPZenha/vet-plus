# Blueprint Render — stack completa Vet Plus+
# https://render.com/docs/blueprint-spec
#
# vet-plus.onrender.com = frontend (React + nginx proxy)
# vet-plus-auth.onrender.com = API de autenticação

envVarGroups:
  - name: vet-shared
    envVars:
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: vet-auth-db
    plan: free
    databaseName: auth_db
    user: vet_user
  - name: vet-clients-db
    plan: free
    databaseName: clients_db
    user: vet_user
  - name: vet-animals-db
    plan: free
    databaseName: animals_db
    user: vet_user
  - name: vet-consultations-db
    plan: free
    databaseName: consultations_db
    user: vet_user
  - name: vet-vaccination-db
    plan: free
    databaseName: vaccination_db
    user: vet_user
  - name: vet-inventory-db
    plan: free
    databaseName: inventory_db
    user: vet_user

services:
  - type: web
    name: vet-plus
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: AUTH_URL
        fromService:
          type: web
          name: vet-plus-auth
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUTH_HOST
        fromService:
          type: web
          name: vet-plus-auth
          property: host
      - key: CLIENTS_URL
        fromService:
          type: web
          name: vet-plus-clients
          envVarKey: RENDER_EXTERNAL_URL
      - key: CLIENTS_HOST
        fromService:
          type: web
          name: vet-plus-clients
          property: host
      - key: ANIMALS_URL
        fromService:
          type: web
          name: vet-plus-animals
          envVarKey: RENDER_EXTERNAL_URL
      - key: ANIMALS_HOST
        fromService:
          type: web
          name: vet-plus-animals
          property: host
      - key: CONSULTATIONS_URL
        fromService:
          type: web
          name: vet-plus-consultations
          envVarKey: RENDER_EXTERNAL_URL
      - key: CONSULTATIONS_HOST
        fromService:
          type: web
          name: vet-plus-consultations
          property: host
      - key: VACCINATION_URL
        fromService:
          type: web
          name: vet-plus-vaccination
          envVarKey: RENDER_EXTERNAL_URL
      - key: VACCINATION_HOST
        fromService:
          type: web
          name: vet-plus-vaccination
          property: host
      - key: INVENTORY_URL
        fromService:
          type: web
          name: vet-plus-inventory
          envVarKey: RENDER_EXTERNAL_URL
      - key: INVENTORY_HOST
        fromService:
          type: web
          name: vet-plus-inventory
          property: host

  - type: web
    name: vet-plus-auth
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.auth
    dockerContext: .
    healthCheckPath: /api/docs/
    envVars:
      - fromGroup: vet-shared
      - key: DATABASE_URL
        fromDatabase:
          name: vet-auth-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: vet-plus
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: vet-plus-clients
    runtime: docker
    plan: free
    dockerfilePath: ./services/clients/Dockerfile
