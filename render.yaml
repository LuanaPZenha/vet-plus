# Blueprint Render — Opção A: microsserviço de autenticação (demo acadêmica)
# https://render.com/docs/blueprint-spec

databases:
  - name: vet-auth-db
    plan: free
    databaseName: auth_db
    user: vet_user

services:
  - type: web
    name: vet-plus-auth
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/docs/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vet-auth-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
